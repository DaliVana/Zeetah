name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.17.0-dev.56+a8226cd53'

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      # The published artifact builds ReleaseFast (safety checks, asserts and
      # @intCast bounds all elided). Re-run the suite under ReleaseSafe so the
      # optimized codegen is exercised with bounds/overflow/cast checks and the
      # hot-path capacity assertions still active.
      - name: Test (ReleaseSafe — optimized codegen, safety checks on)
        run: zig build test -Doptimize=ReleaseSafe

      - name: Doc examples (README / EXAMPLES snippets compile & run)
        run: zig build doctest

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos
          - x86_64-windows
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.17.0-dev.56+a8226cd53'

      - name: Build (${{ matrix.target }})
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast
